<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fish body -->
  <ellipse cx="45" cy="50" rx="30" ry="20" fill="url(#grad)"/>
  <!-- Fish tail -->
  <polygon points="15,50 5,35 5,65" fill="url(#grad)"/>
  <!-- Fish eye -->
  <circle cx="60" cy="45" r="5" fill="white"/>
  <circle cx="62" cy="45" r="2" fill="black"/>
  <!-- Fish mouth -->
  <path d="M70 50 Q75 45 75 50 Q75 55 70 50" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Fish fin -->
  <path d="M40 30 Q45 20 50 30" fill="url(#grad)"/>
</svg>
